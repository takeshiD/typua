[package]
name = "typua"
version = "0.0.1"
edition = "2024"

[dependencies]
anyhow = "1.0.98"
clap = "4.5.38"
full_moon = { version = "2.0.0", features = ["lua54", "luajit"] }
thiserror = "2.0.12"

[lib]
name = "typua_lib"
path = "src/lib.rs"
crate-type = ["cdylib", "rlib"]
bench = false

[[bin]]
name = "typua"
path = "src/cli/main.rs"
bench = false
